{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="auth-title">🔐 Sign In</h2>
        <p class="auth-subtitle">Welcome back! Enter your credentials to continue.</p>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>

        <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        <p class="auth-footer hint">Admin: admin@example.com / admin123</p>
    </div>
</div>
{% endblock %}
