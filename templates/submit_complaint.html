{% extends 'base.html' %}
{% block title %}Submit Complaint{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📨 Submit a Complaint</h1>
    <p>Describe your issue and we'll look into it promptly.</p>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('submit_complaint') }}">
        <div class="form-group">
            <label for="title">Complaint Title</label>
            <input type="text" id="title" name="title" placeholder="Brief title of your complaint" required maxlength="100">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="6"
                placeholder="Describe your complaint in detail..." required></textarea>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Submit Complaint</button>
        </div>
    </form>
</div>
{% endblock %}
